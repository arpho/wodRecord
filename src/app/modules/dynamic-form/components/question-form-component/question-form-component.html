<div [formGroup]="form">
  <label [attr.for]="question?.key">{{ question?.label }}</label>

  <div [ngSwitch]="question?.controlType">
    <input class='question' ngDefaultControl *ngSwitchCase="'textbox'" [formControlName]="question?.key"
      [type]="question?.type" />


    <section [ngSwitch]="question?.controlType" class='question'>
      <ion-textarea ngDefaultControl *ngSwitchCase="'textArea'" [formControlName]="question?.key" [id]="question?.key"
        autoGrow="question?.autoGrow" [value]="question?.value"></ion-textarea>
    </section>

    <section *ngSwitchCase="'code'">
      <app-code-generator class='question' [formControlName]="question?.key" [id]="question?.key"
        [code]="question?.value" [generatorFunction]="question?.generatorFunction"
        [validator]="question?.validator"></app-code-generator>
    </section>

    <section *ngSwitchCase="'email'">

      <app-email-field class='question' [formControlName]="question?.key" [email]="question?.value" [id]="question.key">
      </app-email-field>




    </section>
    <section *ngSwitchCase="'checkbox'">
      <ion-checkbox class='question' [(ngModel)]="question.value" [formControlName]="question?.key" [id]="question.key">
      </ion-checkbox>
      <p>{{question?.text}}</p>
    </section>
    <section *ngSwitchCase="'enabledFunctions'" class="question">
      <app-enabled-functions class='question' [(ngModel)]="question.value" [enabledFunctions]="question?.value"
        [formControlName]="question?.key" [id]="question.key"></app-enabled-functions>
    </section>

    <section *ngSwitchCase="'password'">

      <app-password-field class='question' [formControlName]="question?.key"
        [retypePassword]="question?.retypePassword"></app-password-field>
    </section>

    <section *ngSwitchCase="'address'">
    </section>

    <section *ngSwitchCase="'datebox'" class='question'>
      <ion-datetime [formControlName]="question?.key" [id]="question?.key" [isDateEnabled]="question?.isDateEnabled"
        [presentation]="question?.presentation" max="3000-12-31T23:59:59">
      </ion-datetime>
    </section>
    <section *ngSwitchCase="'listField'" class="question">
      <app-list-field [formControlName]="question?.key" [value]="question.value" [editPage]="question.editPage"
        [createPage]="question.createPage" [headers]="question.headers" [data4Modal]="question.data4Modal"
        [deleteItem]="question.deleteItem" [itemViewerComponent]="question.itemViewerComponent"[service]="question.service"  ></app-list-field>
    </section>

    <section *ngSwitchCase="'switchBox'" class="question">
      <p class="switchText">
        {{ getValue ? question.labelTrue : question.labelFalse }}
      </p>
      <ion-icon [name]="getValue ? question.iconTrue:question.iconFalse"></ion-icon>
      <ion-toggle [formControlName]="question?.key"[value]="!getValue" [id]="question?.key"></ion-toggle>
    </section>


    <section *ngSwitchCase="'itemSelector'" class="question" [formControlName]="question?.key" [id]="question?.key"
      ngDefaultControl>
      <app-selector-items [formControlName]="question?.key" [id]="question?.key" [text]="question?.text"
        [service]="question?.service" (selectedItem)="question.selectedItem($event)"
        [sorterFunction]="question?.sorterFunction" [filterFunction]="question?.ItemsFilterFunction"
        [createPopup]="question?.createPopup" [item]="question?.value" [service]="question?.service"
        [data4Modal]="question?.data4Modal" [value]="question?.value"
        (selectedItem)="question.selectedItem($event)"></app-selector-items>

    </section>
    <ion-select [id]="question?.key" *ngSwitchCase="'dropdown'" [formControlName]="question?.key">
      <ion-select-option *ngFor="let opt of question?.options" [value]="opt?.value">{{
        opt.key
        }}</ion-select-option>
    </ion-select>

    <section style="color:red" *ngIf="!isValid">
      {{ question ? question.label : "" }} {{'required'|translate}}
    </section>
  </div>
