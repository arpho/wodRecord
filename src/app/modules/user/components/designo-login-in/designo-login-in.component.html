
<div class="signIn">
<div class="paperSignIn " style="background-image: url('/assets/images/splash.jpg'); height: 100%;width: 100%;">

</div>

<div class="signInFormContainer ">
  <div class="_waitsignIn" class="signInwait"></div>
  <form class="login" [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate >
    <ion-item>


      <ion-input formControlName="email" class="formField"  color="dark" type="email" placeholder="Your email address" [class.invalid]="!loginForm.controls['email'].valid &&
    loginForm.controls['email'].touched">
      </ion-input>
    </ion-item>
    <ion-item class="error-message" *ngIf="!loginForm.controls['email'].valid &&
    loginForm.controls['email'].touched">
      <ion-label>Please enter a valid email address.</ion-label>
    </ion-item>
    <ion-item>
      <ion-input formControlName="password" type="password" placeholder="Your
    password" [class.invalid]="!loginForm.controls['password'].valid&&
    loginForm.controls['password'].touched">
      </ion-input>
    </ion-item>
    <ion-item class="error-message" *ngIf="!loginForm.controls['password'].valid
    && loginForm.controls['password'].touched">
      <ion-label>Your password needs more than 6 characters.</ion-label>
    </ion-item>
    <div class="parent">
      <div class="loginButtons " >

    <ion-button (click)="loginUser(loginForm)" expand="block" color="dark" [disabled]="!loginForm.valid" style="padding:0.4rem;width:100%">
      Sign IN
    </ion-button>
  <ion-button expand="block" (click)="register()" color="dark" style="padding:0.4rem">
    {{buttonText}}
  </ion-button>
  <ion-button expand="block"  routerLink="/users/reset-password" color="dark">
    password dimenticata :(
  </ion-button>


  </div>
  </div>
</form>
  <h1 class="title">Sign in</h1>
  </div>
  <div class="userButtonUnbinded disabled">
    <svg class="buttonIcon dot" focusable="false" viewBox="0 0 24 24" aria-hidden="true">
      <path
        d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM9 6c0-1.66 1.34-3 3-3s3 1.34 3 3v2H9V6zm9 14H6V10h12v10zm-6-3c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2z">
      </path>
    </svg>
  </div>


</div>
