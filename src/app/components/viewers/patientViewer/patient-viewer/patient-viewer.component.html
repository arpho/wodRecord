<ion-row class="patient"style="width:100vw; background-color:#f2eceb; border-radius:7px">
  <ion-col class="firstName"><h1>{{item?.firstName}}</h1></ion-col>
  <ion-col class="lastName"><h1>{{item?.lastName}}</h1></ion-col>
  <ion-col class="gender"><h1>{{item?.gender}}</h1></ion-col>
  <ion-col class="dob"><h1>{{getBirthDate()}}</h1></ion-col>
</ion-row>
