<ion-row class="location">
    <ion-col ><h3 class="city address">{{item.city}}</h3></ion-col>
    <ion-col ><h3 class="street address">{{item.street}}</h3></ion-col>
    <ion-col ><h3 class="number address">{{makeNumber()}}</h3></ion-col>
    <ion-col ><h3 class="zipCode address">{{item.zipCode}}</h3></ion-col>
</ion-row>
