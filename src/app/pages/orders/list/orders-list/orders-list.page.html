<ion-header>
  <ion-toolbar>
    <ion-title>ordersList</ion-title>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home"></ion-back-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>


  <app-grid-injectable-items
  [emptyText]="emptyText"
  [editPage]="editPage"
  [createPage]="createPage"
  (item2Delete)="deleteItem($event)"
  [titleFactory]="titleFactory"
  [itemViewerComponent]="itemViewerComponent"
  [hydeFab]="hydeFab"
  [headers]="headers"
  [buttons]="buttons"
  [navigationText]="navigationText"
  [service]="service"
  (move2nextPage)="move2nextPage()"
  (move2previousPage)="move2previousPage()"
  [navigationText]="navigationText"
  (move2lastPage)="move2lastPage()"
  (move2firstPage)="move2firstPage()"

 ></app-grid-injectable-items>

</ion-content>
