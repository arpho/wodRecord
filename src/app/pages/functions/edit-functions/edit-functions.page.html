<ion-header>
  <ion-toolbar>
    <ion-title>{{title}}</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="close()">
        <ion-icon name="close">
        </ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <app-dynamic-form
  [questions]="formFields"
   (interactiveSubmit)="filter($event)"
    (singleSubmit)="submit($event)"
   [submitText]="submitText"
   ></app-dynamic-form>
</ion-content>
